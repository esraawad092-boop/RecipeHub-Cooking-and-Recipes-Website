<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeHub - تواصل معنا</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">RecipeHub 🍳</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="recipes.html">الوصفات</a></li>
            <li><a href="contact.html" class="active">تواصل معنا</a></li>
            <li><a href="login.html" class="btn-login">خروج</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h2>يسعدنا تواصلك معنا</h2>
        <p>إذا كان لديك أي اقتراح لوصفة جديدة أو استفسار، راسلنا فوراً!</p>
        
        <form action="#">
            <div class="input-group">
                <label for="name">الاسم الكامل</label>
                <input type="text" id="name" required placeholder="أدخل اسمك">
            </div>
            <div class="input-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label for="message">رسالتك</label>
                <textarea id="message" rows="5" required placeholder="اكتب رسالتك هنا..."></textarea>
            </div>
            <button type="submit" class="btn-submit-form">إرسال الرسالة</button>
        </form>
    </div>
    <script src="js/main.js"></script>
</body>
</body>
</html>
